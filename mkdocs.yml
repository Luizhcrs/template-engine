site_name: template-engine
site_description: Document normalization engine — learn templates from examples and convert via LLM
site_url: https://luizhcrs.github.io/template-engine/
repo_url: https://github.com/Luizhcrs/template-engine
repo_name: Luizhcrs/template-engine
edit_uri: edit/main/docs/
copyright: Copyright &copy; 2026 luizhcrs · Apache 2.0

theme:
  name: material
  language: en
  font:
    text: Inter
    code: JetBrains Mono
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep orange
      accent: deep orange
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep orange
      accent: deep orange
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.action.edit
    - content.action.view
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil
    view: material/eye

extra_css:
  - assets/stylesheets/extra.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Luizhcrs
    - icon: fontawesome/brands/linkedin
      link: https://linkedin.com/in/luizhcrs
  alternate:
    - name: English
      link: /template-engine/
      lang: en
    - name: Português (Brasil)
      link: /template-engine/pt/
      lang: pt-BR

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

plugins:
  - search:
      separator: '[\s​\-_,:!=\[\]()"`/]+|\.(?!\d)|&[lg]t;|(?!\b)(?=[A-Z][a-z])'
  - i18n:
      docs_structure: suffix
      languages:
        - locale: en
          name: English
          default: true
          build: true
        - locale: pt
          name: Português (Brasil)
          build: true
          nav_translations:
            Home: Início
            Quickstart: Comece aqui
            Concepts: Conceitos
            Pipeline: Pipeline
            Preset anatomy: Anatomia do preset
            Render ops: Operações de renderização
            Visual validation: Validação visual
            Providers: Provedores LLM
            Overview: Visão geral
            API Reference: Referência API
            Contributing: Contribuindo

nav:
  - Home: index.md
  - Quickstart: quickstart.md
  - Concepts:
    - Pipeline: concepts/pipeline.md
    - Preset anatomy: concepts/preset.md
    - Render ops: concepts/render-ops.md
    - Visual validation: concepts/visual-validation.md
  - Providers:
    - Overview: providers/index.md
  - Contributing: contributing.md
