site_name: template-engine
site_description: Document normalization engine — learn templates from examples and convert via LLM
site_url: https://luizhcrs.github.io/template-engine/
repo_url: https://github.com/Luizhcrs/template-engine
repo_name: Luizhcrs/template-engine
edit_uri: edit/main/docs/

theme:
  name: material
  language: pt
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - content.code.copy
    - content.action.edit
  icon:
    repo: fontawesome/brands/github

nav:
  - Home: index.md
  - Quickstart: quickstart.md
  - Concepts:
    - Pipeline: concepts/pipeline.md
    - Preset anatomy: concepts/preset.md
    - Render ops: concepts/render-ops.md
  - Providers:
    - Overview: providers/index.md
    - Gemini: providers/gemini.md
    - Custom provider: providers/custom.md
  - API Reference: api.md
  - Contributing: contributing.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true
  - tables

plugins:
  - search
